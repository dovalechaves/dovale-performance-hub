services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend-http.rule=Host(`backend.dovale.online`)
      - traefik.http.routers.backend-http.entrypoints=http
      - traefik.http.services.backend.loadbalancer.server.port=3001

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: https://backend.dovale.online/api
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend-http.rule=Host(`lojas.dovale.online`)
      - traefik.http.routers.frontend-http.entrypoints=http
      - traefik.http.services.frontend.loadbalancer.server.port=80

networks:
  coolify:
    external: true
