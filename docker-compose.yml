services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - coolify-overlay
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify-overlay
      - traefik.http.routers.backend-http.rule=Host(`backend.dovale.online`)
      - traefik.http.routers.backend-http.entrypoints=http
      - traefik.http.routers.backend-http.service=backend-svc
      - traefik.http.services.backend-svc.loadbalancer.server.port=3001

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: https://backend.dovale.online/api
    restart: unless-stopped
    networks:
      - coolify-overlay
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify-overlay
      - traefik.http.routers.frontend-http.rule=Host(`lojas.dovale.online`)
      - traefik.http.routers.frontend-http.entrypoints=http
      - traefik.http.routers.frontend-http.service=frontend-svc
      - traefik.http.services.frontend-svc.loadbalancer.server.port=80

networks:
  coolify-overlay:
    external: true
